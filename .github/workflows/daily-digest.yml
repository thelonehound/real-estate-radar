name: Real Estate Radar — Daily Digest

on:
  schedule:
    # 02:30 UTC = 08:00 AM IST every day
    - cron: "30 2 * * *"
  workflow_dispatch:
    # This button lets you trigger it manually from GitHub for testing

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run digest
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          SERPER_API_KEY:      ${{ secrets.SERPER_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node digest.js
