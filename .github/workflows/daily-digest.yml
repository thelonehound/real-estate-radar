name: Real Estate Radar — Daily Digest

on:
  schedule:
    # 02:30 UTC = 08:00 AM IST every day
    - cron: "30 2 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Run digest
        env:
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          SERPER_API_KEY:            ${{ secrets.SERPER_API_KEY }}
          WORK_EMAIL_USER:           ${{ secrets.WORK_EMAIL_USER }}
          WORK_EMAIL_APP_PASSWORD:   ${{ secrets.WORK_EMAIL_APP_PASSWORD }}
        run: node digest.js
